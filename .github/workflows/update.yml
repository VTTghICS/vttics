name: Update Ferien Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"  # every Monday

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests ics

      - name: Run script
        run: python generate_ferien_gesamt.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/ferien_gesamt.ics

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Update calendar"
          git push
