name: Update Ferien Calendar

on:
  schedule:
    - cron: "0 3 * * 1"   # every Monday at 03:00
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests ics

      - name: Run script
        run: python generate_ferien_gesamt.py
      - name: Commit updated ICS
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          - name: Commit updated ICS
  run: |
    git config user.name "github-actions"
    git config user.email "actions@github.com"
    git add docs/ferien_gesamt.ics

    git diff --cached --quiet && echo "No changes" && exit 0

    git commit -m "Auto-update calendar"
    git push
